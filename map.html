<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GPS Map - Kakao</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; }
    #map { width:100%; height:100vh; background:#eee; }
    #debug {
      position: fixed; left: 8px; top: 8px;
      background: rgba(255,255,255,0.95);
      padding: 6px 8px; border-radius: 6px;
      font-size: 12px; z-index: 9999;
      max-width: 92vw; white-space: pre-wrap;
    }
  </style>

  <script>
    // 에러를 debug 박스에 표시
    function dbg(msg){
      const el = document.getElementById('debug');
      if (!el) return;
      el.style.display = 'block';
      el.textContent = String(msg);
    }
    window.onerror = function(msg, url, line, col){
      dbg(`JS ERROR: ${msg}\n${url}:${line}:${col}`);
    };
  </script>

  <!-- Kakao Map JS SDK -->
  <!-- autoload=false 로딩 안정화 (kakao.maps.load()로 시작) -->
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=fa444f68a12c88d61f851d45946119ad&autoload=false"></script>
</head>

<body>
  <div id="map"></div>
  <div id="debug">BOOT</div>

  <script>
    // ===== 안정적인 디버그/타임아웃 유틸 =====
    // 중복 선언 방지: window에 보관
    window.__t0 = window.__t0 || Date.now();

    function step(msg){
      const el = document.getElementById('debug');
      if (!el) return;
      el.style.display = 'block';
      el.textContent = msg + "\n(t=" + (Date.now() - window.__t0) + "ms)";
    }

    step("JS Running...\nURL: " + location.href);

    // 5초 안에 지도 생성이 안 되면 상태 출력
    let mapInitialized = false;
    setTimeout(function(){
      if (mapInitialized) return;

      let status =
        "TIMEOUT: map not initialized\n" +
        "typeof kakao = " + (typeof kakao) + "\n" +
        "kakao.maps = " + (kakao && kakao.maps ? "OK" : "NO") + "\n" +
        "typeof kakao.maps.load = " +
          (kakao && kakao.maps ? typeof kakao.maps.load : "N/A") + "\n\n" +
        "Check:\n" +
        "1) Kakao 콘솔 JavaScript SDK 도메인에 현재 도메인 등록\n" +
        "2) WebView 인터넷 권한/네트워크\n" +
        "3) WebView DomStorage/Database Enabled";
      step(status);
    }, 5000);

    // ===== kakao 객체 체크 =====
    if (typeof kakao === "undefined" || !kakao.maps || typeof kakao.maps.load !== "function") {
      step(
        "Kakao SDK not ready.\n" +
        "kakao=" + (typeof kakao) + "\n" +
        "→ sdk.js 로드 실패/차단 가능\n" +
        "브라우저: DevTools Network에서 sdk.js 200 확인"
      );
    } else {
      step("kakao found. Calling kakao.maps.load...");

      // ===== 지도 초기화 (단 1회) =====
      kakao.maps.load(function() {
        step("kakao.maps.load OK. Creating map...");

        const mapEl = document.getElementById('map');
        const map = new kakao.maps.Map(mapEl, {
          center: new kakao.maps.LatLng(37.438389, 127.174611),
          level: 3
        });

        mapInitialized = true;
        step("Map created OK");

        // ===== 기존 기능 유지 =====
        let markers = [];
        let polyline = null;

        // MainActivity.evaluateJavascript("addPoint(lat,lon)") 호환
        window.addPoint = function(lat, lon){

          const pos = new kakao.maps.LatLng(lat, lon);

          const circle = new kakao.maps.Circle({
            center: pos,
            radius: 3.0,   // ★ 점 크기 (미터 단위, 1~3 추천)

            strokeWeight: 0,

            fillColor: "#006400",   // ★ 짙은 파란색
            fillOpacity: 0.95
          });

          circle.setMap(map);
          markers.push(circle);
          map.setCenter(pos);
        };

        window.clearPoints = function(){
          for (const m of markers) m.setMap(null);
          markers = [];
          if (polyline) { polyline.setMap(null); polyline = null; }
        };

        // MainActivity에서 loadTrack 할 때 drawPolyline([...]) 호환
        window.drawPolyline = function(points){
          try{
            const path = points.map(p => new kakao.maps.LatLng(p[0], p[1]));
            if (polyline) polyline.setMap(null);

            polyline = new kakao.maps.Polyline({
              path: path,
              strokeWeight: 3,
              strokeColor: "#008000",
              strokeOpacity: 0.9
            });
            polyline.setMap(map);

            const bounds = new kakao.maps.LatLngBounds();
            path.forEach(latlng => bounds.extend(latlng));
            map.setBounds(bounds);

            step("Polyline drawn: " + path.length + " pts");
          }catch(e){
            step("drawPolyline error: " + e);
          }
        };
      });
    }
  </script>
</body>
</html>
